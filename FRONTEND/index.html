<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crados Dex - Frontend</title>

    <link rel="stylesheet" href="assets/style.css">
    <!--Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Crados Dex</h1>

        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="random_crados.html">Crados au hasard</a>
                </li>
            </ul>
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Rechercher un Crados...">
                <button id="filter-button">Filtrer</button>
            </div>   
        </nav>
        
    </header>
    <main>
        <section id="crados-list">
            <!-- La liste des Crados sera affichée ici -->
             <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Description</th>
                        <th>Image</th>
                    </tr>
                </thead>
                <tbody id="crados-table-body">
                    <!-- Les Crados seront ajoutés ici dynamiquement -->
                </tbody>
            </table>
        </section>
    </main>
    <script src="assets/script.js"></script>
</body>
</html>
