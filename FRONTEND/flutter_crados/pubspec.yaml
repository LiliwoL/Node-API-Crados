name: crados_dex
description: Une application Flutter pour consulter l'API CradosDex.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  flutter_dotenv: ^6.0.1
  provider: ^6.1.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
  
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  remove_alpha_ios: true